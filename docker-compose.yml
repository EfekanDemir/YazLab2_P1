version: '3.8'

services:
  # ---------------------------------------------
  # 1. API GATEWAY (DISPATCHER)
  # ---------------------------------------------
  dispatcher:
    build: ./dispatcher
    # Sadece dispatcher servisi dışarıya port açabilir
    ports:
      - "8080:8080"
    networks:
      - internal_network
      - dispatcher_db_net
    environment:
      - PORT=8080
      # Mongoose bağlantı dizesi: mongodb://<servis_adi>:<port>/<veritabani_adi>
      - MONGODB_URI=mongodb://dispatcher_db:27017/dispatcher
    depends_on:
      - dispatcher_db
    restart: unless-stopped

  dispatcher_db:
    image: mongo:latest
    # Ports yerine expose kullanımı. Sadece ağı paylaşan servis 27017 portunu görebilir. Dış dünyadan izole.
    expose:
      - "27017"
    volumes:
      - dispatcher_data:/data/db
    networks:
      - dispatcher_db_net
    restart: unless-stopped


  # ---------------------------------------------
  # 2. AUTH SERVICE (Oturum Açma)
  # ---------------------------------------------
  auth-service:
    build: ./auth-service
    networks:
      - internal_network
      - auth_db_net
    environment:
      - PORT=3000 # Inter-network için kullanılacak port (Dışarıya açık DEĞİL)
      - MONGODB_URI=mongodb://auth_db:27017/auth
    depends_on:
      - auth_db
    restart: unless-stopped

  auth_db:
    image: mongo:latest
    expose:
      - "27017"
    volumes:
      - auth_data:/data/db
    networks:
      - auth_db_net
    restart: unless-stopped


  # ---------------------------------------------
  # 3. PRODUCT SERVICE (1. Mikroservis)
  # ---------------------------------------------
  product-service:
    build: ./product-service
    networks:
      - internal_network
      - product_db_net
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://product_db:27017/product
    depends_on:
      - product_db
    restart: unless-stopped

  product_db:
    image: mongo:latest
    expose:
      - "27017"
    volumes:
      - product_data:/data/db
    networks:
      - product_db_net
    restart: unless-stopped


  # ---------------------------------------------
  # 4. REPORT SERVICE (2. Mikroservis)
  # ---------------------------------------------
  report-service:
    build: ./report-service
    networks:
      - internal_network
      - report_db_net
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://report_db:27017/report
    depends_on:
      - report_db
    restart: unless-stopped

  report_db:
    image: mongo:latest
    expose:
      - "27017"
    volumes:
      - report_data:/data/db
    networks:
      - report_db_net
    restart: unless-stopped


# ---------------------------------------------
# NETWORK (Ağ Tanımları) İZOLASYONU
# ---------------------------------------------
networks:
  # Tüm servislerin birbiriyle Gateway (dispatcher) üzerinden veya kendi aralarında "bridge" yetenekleriyle haberleştiği ortak güvenli ağ
  internal_network:
    driver: bridge
  
  # Veritabanı Ağları (internal: true ile internete ve diğer ağlara kapalı tam izolasyon sağlanır)
  # Veritabanları o kadar izole ki, konteyner içinden internete çıkıp "ping google.com" bile yapılamaz.
  dispatcher_db_net:
    driver: bridge
    internal: true
  auth_db_net:
    driver: bridge
    internal: true
  product_db_net:
    driver: bridge
    internal: true
  report_db_net:
    driver: bridge
    internal: true


# ---------------------------------------------
# VOLUMES (Veri Kalıcılığı)
# ---------------------------------------------
volumes:
  dispatcher_data:  # Dispatcher DB Verileri 
  auth_data:        # Auth DB Verileri 
  product_data:     # Product DB Verileri
  report_data:      # Report DB Verileri
